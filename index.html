<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Chatbot</title>

<style>

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #f7f7f8;
}

/* زر */
#chat-button {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #10a37f;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
}

/* الصندوق */
#chat-box {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 370px;
  height: 550px;
  background: white;
  border-radius: 15px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* header */
#chat-header {
  background: #10a37f;
  color: white;
  padding: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: bold;
  font-size: 14px;
}

/* logo */
#logo {
  width: 35px;
  height: 35px;
  border-radius: 50%;
}

/* الرسائل */
#messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

/* row */
.msg-row {
  display: flex;
  margin: 10px 0;
}

/* bubble */
.message {
  max-width: 75%;
  padding: 10px;
  border-radius: 10px;
  line-height: 1.4;
  font-size: 14px;
}

/* user */
.user {
  justify-content: flex-end;
}

.user .message {
  background: #10a37f;
  color: white;
}

/* bot */
.bot {
  justify-content: flex-start;
}

.bot .message {
  background: #f1f1f1;
  color: black;
}

/* input */
#input-box {
  display: flex;
  background: #f7f7f8;
  padding: 8px;
  border-top: 1px solid #ddd;
}

#input {
  flex: 1;
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 5px;
  outline: none;
}

#send-btn {
  background: #10a37f;
  border: none;
  color: white;
  padding: 10px 15px;
  margin-right: 5px;
  cursor: pointer;
  border-radius: 5px;
}

/* typing dots */
.typing span {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #999;
  border-radius: 50%;
  margin: 2px;
  animation: blink 1.4s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0; }
  40% { opacity: 1; }
}

</style>
</head>

<body>

<button id="chat-button">💬</button>

<div id="chat-box">

<div id="chat-header">
  <img src="logo.png" id="logo">
  <span>وزارة التجارة وتنمية الصادرات</span>
</div>

<div id="messages"></div>

<div id="input-box">
  <button id="send-btn">إرسال</button>
  <input id="input" placeholder="اكتب سؤالك هنا..." />
</div>

</div>

<script>

const chatBtn = document.getElementById("chat-button");
const chatBox = document.getElementById("chat-box");
const sendBtn = document.getElementById("send-btn");
const input = document.getElementById("input");
const messages = document.getElementById("messages");

chatBtn.onclick = () => {
  chatBox.style.display =
    chatBox.style.display === "flex" ? "none" : "flex";
};

function addMessage(text, sender) {
  const row = document.createElement("div");
  row.className = "msg-row " + sender;

  const msg = document.createElement("div");
  msg.className = "message";
  msg.innerText = text;

  row.appendChild(msg);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const row = document.createElement("div");
  row.className = "msg-row bot";

  const msg = document.createElement("div");
  msg.className = "message typing";
  msg.innerHTML = "<span></span><span></span><span></span>";

  row.appendChild(msg);
  messages.appendChild(row);

  return msg;
}

sendBtn.onclick = () => {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const typing = showTyping();

  setTimeout(() => {
    typing.innerText = "سيتم ربط هذا الجواب بالذكاء الاصطناعي لاحقًا 🤖";
  }, 1200);
};

</script>

</body>
</html>
